<div class="account-page" *ngIf="user">

  <div class="page-header">
    <h1 class="page-title">Account settings</h1>
  </div>

  <!-- Profile picture -->
  <div class="card">
    <div class="card-title">Profile picture</div>
    <div class="avatar-row">
      <div class="avatar-wrap">
        <img [src]="avatarUrl || 'assets/img/avatar.jpg'" class="avatar" alt="Profile picture" />
        <label class="avatar-overlay" [class.loading]="pictureLoading">
          <span *ngIf="!pictureLoading">Change</span>
          <span *ngIf="pictureLoading">Uploading…</span>
          <input type="file" accept="image/*" (change)="onFileSelected($event)" hidden />
        </label>
      </div>
      <div class="avatar-info">
        <div class="avatar-name">{{ displayName }}</div>
        <div class="avatar-role">{{ user.role }}</div>
        <p class="avatar-hint">Click the picture to upload a new one.</p>
        <p class="error-msg" *ngIf="pictureError">{{ pictureError }}</p>
      </div>
    </div>
  </div>

  <!-- Change password -->
  <div class="card" *ngIf="user.username !== 'admin'">
    <div class="card-title">Change password</div>
    <form (ngSubmit)="changePassword()">
      <div class="field">
        <label>Current password</label>
        <input type="password" [(ngModel)]="currentPassword" name="currentPassword" placeholder="Enter current password" />
      </div>
      <div class="field">
        <label>New password</label>
        <input type="password" [(ngModel)]="newPassword" name="newPassword" placeholder="Enter new password" />
      </div>
      <div class="field">
        <label>Confirm new password</label>
        <input type="password" [(ngModel)]="confirmNewPassword" name="confirmNewPassword" placeholder="Repeat new password" />
      </div>
      <p class="error-msg" *ngIf="passwordError">{{ passwordError }}</p>
      <p class="success-msg" *ngIf="passwordSuccess">{{ passwordSuccess }}</p>
      <button type="submit" class="submit-btn" [disabled]="passwordLoading">
        {{ passwordLoading ? 'Saving…' : 'Change password' }}
      </button>
    </form>
  </div>

</div>
