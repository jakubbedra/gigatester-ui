<div class="page">
  <div class="page-header">
    <h1 class="page-title">Crosswords</h1>
    <button class="btn-add" (click)="openAdd()">+ New Crossword</button>
  </div>

  <div class="grid" *ngIf="crosswords.length > 0; else empty">
    <div class="card" *ngFor="let cw of crosswords" (click)="edit(cw.id)">

      <div class="card-header">
        <div class="card-icon">🔠</div>
        <div class="card-name">{{ cw.name }}</div>
        <div class="context-wrapper" (click)="stopPropagation($event)">
          <button class="ctx-btn" (click)="toggleMenu($event, cw.id)">···</button>
          <div class="ctx-menu" *ngIf="openMenuId === cw.id">
            <button (click)="edit(cw.id)">Edit</button>
            <button class="danger" (click)="delete($event, cw.id)">Delete</button>
          </div>
        </div>
      </div>

      <div class="card-footer">
        <span class="term-count-label">{{ cw.termCount }} {{ cw.termCount === 1 ? 'term' : 'terms' }}</span>
        <span class="edit-hint">Click to edit →</span>
      </div>

    </div>
  </div>

  <ng-template #empty>
    <div class="empty-state">
      <div class="empty-icon">🔠</div>
      <p>No crosswords yet. Add one to get started.</p>
    </div>
  </ng-template>
</div>

<!-- Add Modal -->
<div class="modal-overlay" *ngIf="showAddModal" (click)="cancelAdd()">
  <div class="modal" (click)="stopPropagation($event)">
    <h2 class="modal-title">New Crossword</h2>
    <div class="form-group">
      <label>Name</label>
      <input type="text" [(ngModel)]="newName" placeholder="Crossword name" />
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" (click)="cancelAdd()">Cancel</button>
      <button class="btn-primary" (click)="saveAdd()" [disabled]="adding || !newName.trim()">
        {{ adding ? 'Creating…' : 'Create & Edit' }}
      </button>
    </div>
  </div>
</div>
