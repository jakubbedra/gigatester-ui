<div class="page">
  <div class="page-header">
    <div class="title-area">
      <button class="back-btn" *ngIf="subjectId" (click)="goBack()">← Back</button>
      <h1 class="page-title">{{ subjectName ?? 'Tests' }}</h1>
    </div>
    <button class="btn-add" *ngIf="canModify && !subjectId" (click)="openAdd()">+ New Test</button>
  </div>

  <!-- Tests -->
  <div class="section-label" *ngIf="subjectId">Tests</div>
  <div class="grid" *ngIf="tests.length > 0; else emptyTests">
    <div class="card" *ngFor="let test of tests" (click)="openTest(test.id)">
      <div class="card-body">
        <div class="card-icon">📝</div>
        <div class="card-name">{{ test.name }}</div>
      </div>
      <div class="context-wrapper" *ngIf="canModify" (click)="stopPropagation($event)">
        <button class="ctx-btn" (click)="toggleMenu($event, test.id)">···</button>
        <div class="ctx-menu" *ngIf="openMenuId === test.id">
          <button (click)="edit($event, test.id)">Edit</button>
          <button class="danger" (click)="delete($event, test.id)">Delete</button>
        </div>
      </div>
    </div>
  </div>
  <ng-template #emptyTests>
    <div class="empty-state" *ngIf="!subjectId">
      <div class="empty-icon">📋</div>
      <p>No tests yet. Click <strong>+ New Test</strong> to create one.</p>
    </div>
    <div class="empty-inline" *ngIf="subjectId">No tests assigned to this subject.</div>
  </ng-template>

  <!-- Crosswords (subject view only) -->
  <ng-container *ngIf="subjectId">
    <div class="section-label">Crosswords</div>
    <div class="grid" *ngIf="crosswords.length > 0; else emptyCrosswords">
      <div class="card" *ngFor="let cw of crosswords" (click)="openCrossword(cw.id)">
        <div class="card-body">
          <div class="card-icon">🔠</div>
          <div class="card-name">{{ cw.name }}</div>
        </div>
        <div class="context-wrapper" *ngIf="canModify" (click)="stopPropagation($event)">
          <button class="ctx-btn" (click)="toggleMenu($event, 'cw-' + cw.id)">···</button>
          <div class="ctx-menu" *ngIf="openMenuId === 'cw-' + cw.id">
            <button (click)="editCrossword($event, cw.id)">Edit</button>
            <button class="danger" (click)="deleteCrossword($event, cw.id)">Delete</button>
          </div>
        </div>
      </div>
    </div>
    <ng-template #emptyCrosswords>
      <div class="empty-inline">No crosswords assigned to this subject.</div>
    </ng-template>
  </ng-container>
</div>

<!-- Add Test Modal -->
<div class="modal-overlay" *ngIf="showAddModal" (click)="cancelAdd()">
  <div class="modal" (click)="stopPropagation($event)">
    <h2 class="modal-title">New Test</h2>

    <div class="form-group">
      <label>Test Name</label>
      <input type="text" [(ngModel)]="newName" placeholder="Test name" />
    </div>

    <div class="form-row-modal">
      <div class="form-group">
        <label>Closed Questions</label>
        <input type="number" [(ngModel)]="newClosed" min="0" />
      </div>
      <div class="form-group">
        <label>Open Questions</label>
        <input type="number" [(ngModel)]="newOpen" min="0" />
      </div>
      <div class="form-group">
        <label>Passing %</label>
        <input type="number" [(ngModel)]="newPassing" min="0" max="100" />
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-secondary" (click)="cancelAdd()">Cancel</button>
      <button class="btn-primary" (click)="saveAdd()" [disabled]="creating || !newName.trim()">
        {{ creating ? 'Creating…' : 'Create & Edit' }}
      </button>
    </div>
  </div>
</div>
