<ng-container *ngIf="isLoginPage; else appShell">
  <router-outlet></router-outlet>
</ng-container>

<ng-template #appShell>
  <div class="app-container">

    <!-- Mobile top bar -->
    <header class="mobile-topbar">
      <button class="hamburger" (click)="toggleSidebar()" [attr.aria-label]="'APP.OPEN_MENU' | translate">
        <span></span><span></span><span></span>
      </button>
      <span class="mobile-title">{{ 'APP.TITLE' | translate }}</span>
    </header>

    <!-- Overlay backdrop (mobile only) -->
    <div class="sidebar-overlay" [class.visible]="sidebarOpen" (click)="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" [class.open]="sidebarOpen">
      <button class="sidebar-close" (click)="closeSidebar()" [attr.aria-label]="'APP.CLOSE_MENU' | translate">✕</button>
      <app-sidebar></app-sidebar>
      <div class="sidebar-footer">
        <span class="sidebar-user">{{ user?.username }}</span>
        <button class="flag-btn" [class.active]="lang.current() === 'en'" (click)="lang.use('en')" title="English"><img src="assets/img/flag-en.svg" alt="EN" class="flag-img"/></button>
        <button class="flag-btn" [class.active]="lang.current() === 'pl'" (click)="lang.use('pl')" title="Polski"><img src="assets/img/flag-pl.svg" alt="PL" class="flag-img"/></button>
        <button class="logout-btn" (click)="logout()">{{ 'APP.SIGN_OUT' | translate }}</button>
      </div>
    </aside>

    <main class="main-content">
      <router-outlet></router-outlet>
    </main>

  </div>
</ng-template>

<app-toast></app-toast>
