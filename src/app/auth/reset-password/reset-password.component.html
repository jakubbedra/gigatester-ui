<div class="login-page">
  <div class="login-card">
    <div class="brand">
      <span class="brand-icon">🔑</span>
      <span class="brand-name">Reset Password</span>
    </div>

    <ng-container *ngIf="!success">
      <div class="field">
        <label>New Password</label>
        <input type="password" [(ngModel)]="newPassword" placeholder="New password" [disabled]="!token || loading" />
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirm password" [disabled]="!token || loading"
               (keydown.enter)="submit()" />
      </div>
      <p class="error-msg" *ngIf="error">{{ error }}</p>
      <button class="submit-btn" [disabled]="!token || loading" (click)="submit()">
        {{ loading ? 'Resetting…' : 'Set New Password' }}
      </button>
    </ng-container>

    <ng-container *ngIf="success">
      <p class="success-msg">Your password has been reset successfully.</p>
      <button class="submit-btn" (click)="goToLogin()">Go to Login</button>
    </ng-container>
  </div>
</div>
