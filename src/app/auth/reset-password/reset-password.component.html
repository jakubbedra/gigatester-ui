<div class="login-page">
  <div class="login-card">
    <div class="brand">
      <span class="brand-icon">🔑</span>
      <span class="brand-name">{{ 'RESET_PASSWORD.TITLE' | translate }}</span>
    </div>

    <ng-container *ngIf="!success">
      <div class="field">
        <label>{{ 'RESET_PASSWORD.NEW_PASSWORD' | translate }}</label>
        <input type="password" [(ngModel)]="newPassword" [placeholder]="'RESET_PASSWORD.NEW_PASSWORD_PLACEHOLDER' | translate" [disabled]="!token || loading" />
      </div>
      <div class="field">
        <label>{{ 'RESET_PASSWORD.CONFIRM_PASSWORD' | translate }}</label>
        <input type="password" [(ngModel)]="confirmPassword" [placeholder]="'RESET_PASSWORD.CONFIRM_PASSWORD_PLACEHOLDER' | translate" [disabled]="!token || loading"
               (keydown.enter)="submit()" />
      </div>
      <p class="error-msg" *ngIf="error">{{ error }}</p>
      <button class="submit-btn" [disabled]="!token || loading" (click)="submit()">
        {{ loading ? ('RESET_PASSWORD.RESETTING' | translate) : ('RESET_PASSWORD.SUBMIT' | translate) }}
      </button>
    </ng-container>

    <ng-container *ngIf="success">
      <p class="success-msg">{{ 'RESET_PASSWORD.SUCCESS' | translate }}</p>
      <button class="submit-btn" (click)="goToLogin()">{{ 'RESET_PASSWORD.GO_TO_LOGIN' | translate }}</button>
    </ng-container>
  </div>
</div>
