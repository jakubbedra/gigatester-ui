<div class="test-wrapper" *ngIf="crossword && form">
  <div class="test-card">

    <h1 class="test-title">{{ crossword.name }}</h1>

    <!-- Resume banner -->
    <div class="resume-banner" *ngIf="existingState && !showNewForm">
      <div class="resume-info">
        <span class="resume-label">You have an unfinished game</span>
        <span class="resume-meta">{{ existingState.crosswordName }}</span>
      </div>
      <div class="resume-actions">
        <button type="button" class="resume-btn primary" (click)="continueGame()">Continue</button>
        <button type="button" class="resume-btn secondary" (click)="showNewForm = true">New game</button>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" *ngIf="showNewForm">

      <div class="field-section">
        <div class="field-label">Number of words</div>
        <div class="form-group">
          <label>
            Words to include
            <span class="avail">/ {{ termCount }} available</span>
          </label>
          <input type="number" formControlName="numberOfWords" min="1" [max]="termCount">
          <span class="field-error" *ngIf="form.get('numberOfWords')?.errors?.['min']">
            Minimum 1 word required
          </span>
          <span class="field-error" *ngIf="form.get('numberOfWords')?.errors?.['max']">
            Max {{ termCount }} words available
          </span>
        </div>
      </div>

      <button type="submit" class="start-btn" [disabled]="form.invalid">Start</button>

    </form>
  </div>
</div>
