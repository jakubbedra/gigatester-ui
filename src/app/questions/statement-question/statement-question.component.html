<div class="stmt-wrap">

  <div class="stmt-list">
    <div class="stmt-row"
         *ngFor="let s of question.statements; let i = index; trackBy: trackByOrder"
         [class.answered]="locked"
         [class.correct]="isCorrect(i)"
         [class.wrong]="isWrong(i)">

      <div class="stmt-index">{{ i + 1 }}.</div>

      <div class="stmt-text">
        {{ s.text }}
      </div>

      <div class="tf-toggle" role="group" [attr.aria-label]="'STATEMENT_QUESTION.TITLE' | translate">
        <button
          type="button"
          class="tf-btn"
          [class.active]="isSelected(i, true)"
          [disabled]="locked"
          (click)="select(i, true)">
          {{ 'STATEMENT_QUESTION.TRUE' | translate }}
        </button>

        <button
          type="button"
          class="tf-btn"
          [class.active]="isSelected(i, false)"
          [disabled]="locked"
          (click)="select(i, false)">
          {{ 'STATEMENT_QUESTION.FALSE' | translate }}
        </button>
      </div>

    </div>
  </div>

  <!-- Optional helper line -->
  <div class="stmt-hint" *ngIf="!locked">
    {{ 'STATEMENT_QUESTION.HINT' | translate }}
    <span class="stmt-hint-badge" [class.ready]="isComplete()">
      {{ isComplete() ? ('STATEMENT_QUESTION.READY' | translate) : ('STATEMENT_QUESTION.INCOMPLETE' | translate) }}
    </span>
  </div>

</div>
