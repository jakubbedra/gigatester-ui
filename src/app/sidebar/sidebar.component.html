<aside class="sidebar">
  <div class="user-profile">
    <img [src]="avatarUrl" class="avatar" alt="User Avatar" (click)="goToAccount()" style="cursor:pointer" />
    <h3>{{ displayName }}</h3>
  </div>

  <nav class="menu">
    <ul>
      <li class="admin-links" *ngIf="isModerator">
        <span class="admin-link" (click)="navigateToSubjectGroups($event)">Groups</span>
        <span class="admin-link" (click)="navigateToAdminSubjects()">Subjects</span>
        <span class="admin-link" (click)="navigateToTests()">Tests</span>
        <span class="admin-link" (click)="navigateToCrosswords()">Crosswords</span>
      </li>

      <li *ngFor="let year of universityYears">
        <span class="menu-title year"
              [class.expanded]="year.expanded"
              (click)="toggleYear(year)">
          <span>{{ year.name }}</span>
          <span>{{ year.expanded ? '▾' : '▸' }}</span>
        </span>

        <ul class="submenu" *ngIf="year.expanded">
          <li *ngFor="let subject of year.subjects">
            <div class="menu-row">
              <span class="menu-title subject"
                    [class.expanded]="subject.expanded"
                    (click)="toggleSubject(subject)">
                {{ subject.name }} {{ subject.expanded ? '▾' : '▸' }}
              </span>
              <div class="context-wrapper" *ngIf="isModerator">
                <button class="ctx-btn" (click)="toggleMenu($event, 'subject-' + subject.id)">···</button>
                <div class="ctx-menu" *ngIf="openMenuId === 'subject-' + subject.id">
                  <button (click)="navigateToSubjects($event)">Edit</button>
                  <button class="danger" (click)="deleteSubject($event, subject.id)">Delete</button>
                </div>
              </div>
            </div>

            <ul class="submenu" *ngIf="subject.expanded">
              <li *ngFor="let test of subject.tests">
                <div class="menu-row test-row">
                  <a [routerLink]="['/tests', test.id]" class="tests">{{ test.name }}</a>
                  <div class="context-wrapper" *ngIf="isModerator">
                    <button class="ctx-btn" (click)="toggleMenu($event, 'test-' + test.id)">···</button>
                    <div class="ctx-menu" *ngIf="openMenuId === 'test-' + test.id">
                      <button (click)="editTest($event, test.id)">Edit</button>
                      <button class="danger" (click)="deleteTest($event, test.id, subject)">Delete</button>
                    </div>
                  </div>
                </div>
              </li>
              <li *ngFor="let cw of subject.crosswords">
                <div class="menu-row test-row">
                  <a [routerLink]="['/crosswords', cw.id]" class="tests crossword-link">🔠 {{ cw.name }}</a>
                </div>
              </li>
            </ul>

          </li>
        </ul>
      </li>
    </ul>
  </nav>
</aside>
