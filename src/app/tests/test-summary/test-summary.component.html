<div class="summary-wrapper">
  <div class="summary-card">

    <h2 class="summary-title">{{ testName }}</h2>

    <!-- EXAM SUMMARY -->
    <ng-container *ngIf="isExam; else learningSummary">

      <div class="summary-score">
        <div class="score-main">
          <span class="score-value">{{ score }}</span>
          <span class="score-sep">/</span>
          <span class="score-max">{{ maxScore }}</span>
          <span class="score-pts">pts</span>
        </div>

        <div class="score-sub">
          <span class="score-percent">{{ percentage }}%</span>

          <span
            class="badge"
            [class.pass]="isPassing === true"
            [class.fail]="isPassing === false"
            *ngIf="isPassing !== null"
          >
            {{ isPassing ? 'PASSED' : 'FAILED' }}
          </span>
        </div>

        <div class="meta-row" *ngIf="passingPercentage !== undefined && passingPercentage !== null">
          Passing threshold: <span class="meta-accent">{{ passingPercentage }}%</span>
        </div>
      </div>

      <div class="actions">
        <button class="btn secondary" (click)="onRetry()">Retry</button>
        <button class="btn primary" (click)="startNew.emit()">Start New Test</button>
      </div>

    </ng-container>

    <!-- LEARNING SUMMARY -->
    <ng-template #learningSummary>
      <div class="learning-box">
        <div class="learning-title">Finished 🎉</div>
        <div class="learning-text">
          You completed all questions in learning mode.
        </div>
      </div>

      <div class="actions">
        <button class="btn secondary" (click)="onRetry()">Retry Learning</button>
        <button class="btn primary" (click)="startExam.emit()">Start a Real Test [coming soon...]</button>
      </div>

<!--      <button class="btn ghost" (click)="startNew.emit()">Back to Test Selection</button>-->
    </ng-template>

  </div>
</div>
