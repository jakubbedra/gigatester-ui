<div class="summary-wrapper" *ngIf="!loading && testState; else loadingTpl">
  <div class="summary-card">

    <h2 class="summary-title">{{ testState.testName }}</h2>

    <!-- EXAM SUMMARY -->
    <ng-container *ngIf="isExam; else learningSummary">

      <div class="summary-score">
        <div class="score-main">
          <span class="score-value">{{ testState.totalScore }}</span>
          <span class="score-sep">/</span>
          <span class="score-max">{{ testState.maxScore }}</span>
          <span class="score-pts">pts</span>
        </div>

        <div class="score-sub">
          <span class="score-percent">{{ percentage }}%</span>

          <span
            class="badge"
            [class.pass]="isPassing === true"
            [class.fail]="isPassing === false"
            *ngIf="isPassing !== null"
          >
            {{ isPassing ? 'PASSED' : 'FAILED' }}
          </span>
        </div>

        <div class="meta-row" *ngIf="testState.passingPercentage">
          Passing threshold: <span class="meta-accent">{{ testState.passingPercentage }}%</span>
        </div>
      </div>

      <div class="actions">
        <button class="btn secondary" (click)="retake()">Retake</button>
      </div>

    </ng-container>

    <!-- LEARNING SUMMARY -->
    <ng-template #learningSummary>
      <div class="learning-box">
        <div class="learning-title">Finished 🎉</div>
        <div class="learning-text">You completed all questions in learning mode.</div>
      </div>

      <div class="actions">
        <button class="btn secondary" (click)="retake()">Retry Learning</button>
      </div>
    </ng-template>

  </div>
</div>

<ng-template #loadingTpl>
  <div class="summary-wrapper">
    <div class="summary-card">
      <p style="text-align:center;color:#888">Loading results…</p>
    </div>
  </div>
</ng-template>
