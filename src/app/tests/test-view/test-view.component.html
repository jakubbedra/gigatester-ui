<div class="test-container">
  <h2>Start Test: {{test.name}}</h2>

  <form [formGroup]="form" (ngSubmit)="submit()">

    <div class="form-group">
      <label>Test Mode</label>
      <select formControlName="mode">
        <option *ngFor="let m of modes()" [value]="m">{{ m }}</option>
      </select>
    </div>

    <div class="form-group" *ngIf="isExamMode()">
      <label>Closed Questions Count</label>
      <input type="number" formControlName="closedQuestionsCount">
    </div>

    <div class="form-group" *ngIf="isExamMode()">
      <label>Open Questions Count</label>
      <input type="number" formControlName="openQuestionsCount">
    </div>

    <div class="form-group" *ngIf="isExamMode()">
      <label>Term Definition Questions Count</label>
      <input type="number" formControlName="termDefinitionQuestionsCount">
    </div>

    <div class="form-group" *ngIf="isExamMode()">
      <label>Passing Percentage</label>
      <input type="number" formControlName="passingPercentage">
    </div>

    <div class="form-group">
      <label>Display Type</label>
      <select formControlName="displayType">
        <option *ngFor="let dt of displayTypes()" [value]="dt">{{ dt }}</option>
      </select>
    </div>

    <button type="submit" [disabled]="form.invalid">Start</button>

  </form>
</div>
