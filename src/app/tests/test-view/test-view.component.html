<div class="test-wrapper" *ngIf="test && form">
  <div class="test-card">

    <h1 class="test-title">{{ test.name }}</h1>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <!-- Mode -->
      <div class="field-section">
        <div class="field-label">Mode</div>
        <div class="toggle-row">
          <button type="button" class="toggle-btn"
                  [class.active]="form.get('mode')?.value === 'EXAM'"
                  (click)="form.get('mode')?.setValue('EXAM')">
            Exam
          </button>
          <button type="button" class="toggle-btn"
                  [class.active]="form.get('mode')?.value === 'LEARNING'"
                  (click)="form.get('mode')?.setValue('LEARNING')">
            Learning
          </button>
        </div>
      </div>

      <!-- Exam-only settings -->
      <div class="exam-section" *ngIf="isExamMode()">
        <div class="exam-grid">

          <div class="form-group">
            <label>
              Closed questions
              <span class="avail">/ {{ availableClosed }} available</span>
            </label>
            <input type="number" formControlName="closedQuestionsCount" min="0" [max]="availableClosed">
            <span class="field-error" *ngIf="validationErrors?.['tooManyClosed']">
              Max {{ validationErrors?.['tooManyClosed']?.max }}
            </span>
          </div>

          <div class="form-group">
            <label>
              Open questions
              <span class="avail">/ {{ availableOpen }} available</span>
            </label>
            <input type="number" formControlName="openQuestionsCount" min="0" [max]="availableOpen">
            <span class="field-error" *ngIf="validationErrors?.['tooManyOpen']">
              Max {{ validationErrors?.['tooManyOpen']?.max }}
            </span>
          </div>

          <div class="form-group passing-group">
            <label>Passing percentage</label>
            <div class="input-suffix-wrap">
              <input type="number" formControlName="passingPercentage" min="0" max="100">
              <span class="suffix">%</span>
            </div>
          </div>

        </div>

        <span class="field-error block-error" *ngIf="validationErrors?.['minOneQuestion']">
          Total question count must be at least 1
        </span>
      </div>

      <!-- Tag filter -->
      <div class="field-section" *ngIf="allTags.length > 0">
        <div class="field-label">Tag filter <span class="field-hint">(leave empty to include all questions)</span></div>
        <div class="tag-filter-chips">
          <button type="button" class="tag-filter-chip"
                  *ngFor="let t of allTags"
                  [class.selected]="isTagSelected(t)"
                  (click)="toggleTag(t)">
            {{ t.key }}
          </button>
        </div>
      </div>

      <!-- Display type -->
      <div class="field-section">
        <div class="field-label">Display</div>
        <div class="toggle-row">
          <button type="button" class="toggle-btn"
                  [class.active]="form.get('displayType')?.value === 'ONE_BY_ONE'"
                  (click)="form.get('displayType')?.setValue('ONE_BY_ONE')">
            One by one
          </button>
          <button type="button" class="toggle-btn"
                  [class.active]="form.get('displayType')?.value === 'ALL_AT_ONCE'"
                  (click)="form.get('displayType')?.setValue('ALL_AT_ONCE')">
            All at once
          </button>
        </div>
      </div>

      <button type="submit" class="start-btn" [disabled]="form.invalid">Start</button>

    </form>
  </div>
</div>
